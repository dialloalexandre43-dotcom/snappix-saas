<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snappix - Chrome Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-left">
        <img src="logo.png" alt="Snappix" class="logo-img" id="logo-img">
        <div class="logo-fallback" id="logo-fallback" style="display: none;">
          <div class="logo-placeholder">S</div>
        </div>
        <span class="header-title">Snappix</span>
      </div>
      <div class="header-right">
        <span class="badge-pro" id="credits-badge">Pro · 47/500</span>
        <button type="button" class="btn-visuals" id="btn-visuals">
          My Visuals
          <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Normal State -->
    <div id="normal-state" class="popup-content">
      <!-- Image Preview -->
      <div class="image-preview-section">
        <div class="image-preview-box" id="image-preview-box">
          <svg class="icon-placeholder" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="6" width="32" height="28" rx="3" />
            <circle cx="14" cy="16" r="3" />
            <path d="M4 28l10-8 6 5 6-4 10 7" />
          </svg>
          <span class="image-detected-text">Image detected</span>
        </div>
        <div class="image-preview-info">
          <p class="image-source-text" id="image-source-text">
            Source automatically detected from the active page.
          </p>
          <button type="button" class="btn-copy-url" id="btn-copy-url">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
            Copy URL
          </button>
        </div>
      </div>
      <div class="divider-inner"></div>

      <!-- Quick Previews -->
      <div class="quick-previews-section">
        <p class="section-label">Style preview</p>
        <div class="previews-scroll" id="quick-previews">
          <!-- Will be populated by JS -->
        </div>
      </div>
      <div class="divider-inner"></div>

      <!-- Style List -->
      <div class="style-list-section">
        <p class="section-title">
          Style <span class="required">*</span>
        </p>
        <div class="style-grid" id="style-grid">
          <!-- Will be populated by JS -->
        </div>
      </div>
      <div class="divider-inner"></div>

      <!-- Format Selector -->
      <div class="format-section">
        <p class="section-title">
          Format <span class="required">*</span>
        </p>
        <div class="format-buttons" id="format-buttons">
          <!-- Will be populated by JS -->
        </div>
      </div>

      <!-- CTA Button -->
      <div class="cta-section">
        <button type="button" class="btn-generate" id="btn-generate">
          <svg class="icon-rocket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z" />
            <path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z" />
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" />
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
          </svg>
          GENERATE NOW
        </button>
      </div>

      <!-- Upload Button -->
      <div class="upload-section">
        <button type="button" class="btn-upload" id="btn-upload">
          <svg class="icon-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload my own file
        </button>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span class="footer-text">3 free images to get started</span>
        <button type="button" class="btn-terms">Terms</button>
      </div>

    </div>

    <!-- Loading State -->
    <div id="loading-state" class="popup-content loading-content" style="display: none;">
      <div class="loading-center">
        <div class="spinner-dots">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
        <p class="loading-text">Generating...</p>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <p class="loading-subtext">Redirecting in 3s...</p>
      </div>
    </div>

    <!-- Success State -->
    <div id="success-state" class="popup-content success-content" style="display: none;">
      <div class="success-center">
        <div class="success-icon-wrapper">
          <svg class="icon-check-large" viewBox="0 0 32 32" fill="none" stroke="#48BB78" stroke-width="2.5">
            <circle cx="16" cy="16" r="13" stroke-width="2" />
            <path d="M10 16.5l4 4 8-8.5" />
          </svg>
        </div>
        <div class="success-text">
          <p class="success-title">Job created!</p>
          <p class="success-subtitle">View in your dashboard</p>
        </div>
        <button type="button" class="btn-open-visuals" id="btn-open-visuals">
          Open my visuals
        </button>
      </div>
    </div>
  </div>

  <!-- Error Message -->
  <div id="error-message" class="error-message" style="display: none;"></div>

  <input type="hidden" id="api-token">
  <input type="hidden" id="api-url">
  <script src="popup.js"></script>
</body>
</html>
